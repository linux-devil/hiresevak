<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Bank building -->
  <rect x="60" y="180" width="120" height="120" fill="#F5E6D3"/>
  <polygon points="60,180 120,140 180,180" fill="#D4A574"/>
  <text x="120" y="165" text-anchor="middle" fill="#B8732F" font-family="Arial, sans-serif" font-size="12" font-weight="bold">BANK</text>
  <rect x="75" y="200" width="12" height="100" fill="#D4A574"/>
  <rect x="95" y="200" width="12" height="100" fill="#D4A574"/>
  <rect x="115" y="200" width="12" height="100" fill="#D4A574"/>
  <rect x="135" y="200" width="12" height="100" fill="#D4A574"/>
  <rect x="155" y="200" width="12" height="100" fill="#D4A574"/>
  
  <!-- Light bulb -->
  <circle cx="250" cy="150" r="40" fill="#F5C842"/>
  <rect x="235" y="185" width="30" height="20" fill="#6B8FBB"/>
  <line x1="235" y1="195" x2="265" y2="195" stroke="#4A6B8A" stroke-width="2"/>
  
  <!-- Credit card -->
  <rect x="280" y="220" width="80" height="50" fill="#D4A574" rx="6"/>
  <rect x="290" y="230" width="12" height="8" fill="#B8732F"/>
  <circle cx="320" cy="245" r="8" fill="#B8732F"/>
  <circle cx="340" cy="245" r="6" fill="#B8732F" opacity="0.7"/>
  <line x1="290" y1="255" x2="310" y2="255" stroke="#B8732F" stroke-width="2"/>
  <line x1="320" y1="255" x2="350" y2="255" stroke="#B8732F" stroke-width="2"/>
  
  <!-- Dollar coin -->
  <circle cx="200" cy="320" r="30" fill="#F5C842"/>
  <text x="200" y="330" text-anchor="middle" fill="#B8732F" font-family="Arial, sans-serif" font-size="24" font-weight="bold">$</text>
</svg>